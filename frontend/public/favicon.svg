<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cream background -->
  <circle cx="50" cy="50" r="49" fill="#F6F1EA"/>

  <!-- Coral ring -->
  <circle cx="48" cy="51" r="32" fill="none" stroke="#D86F5C" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Accent dots on ring -->
  <circle cx="78" cy="34" r="1.8" fill="#D86F5C"/>
  <circle cx="22" cy="72" r="1.4" fill="#D86F5C"/>

  <!-- Serif 'k' monogram -->
  <text
    x="48" y="65"
    font-family="Playfair Display, Didot, Georgia, serif"
    font-size="44" font-weight="500" fill="#3C4858" text-anchor="middle"
  >k</text>

  <!-- Tittle -->
  <circle cx="55" cy="35" r="2.4" fill="#3C4858"/>

  <!-- Sage leaves on the right -->
  <g fill="#7A8A74">
    <ellipse cx="76" cy="55" rx="6" ry="2.4" transform="rotate(-25 76 55)"/>
    <ellipse cx="70" cy="60" rx="5" ry="2.0" transform="rotate(15 70 60)"/>
    <ellipse cx="80" cy="48" rx="5" ry="1.8" transform="rotate(-40 80 48)" opacity="0.85"/>
  </g>
</svg>
